<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --surface2: #EDEAE4;
    --surface3: #E2DED7;
    --text: #1A1816;
    --text2: #6B6560;
    --text3: #A09A93;
    --accent: #2D6A4F;
    --accent-light: #D8F3E8;
    --accent-text: #1B4332;
    --danger: #C1440E;
    --danger-light: #FDEADE;
    --warn: #B45309;
    --warn-light: #FEF3CD;
    --info: #1D4ED8;
    --info-light: #DBEAFE;
    --border: rgba(26,24,22,0.08);
    --border2: rgba(26,24,22,0.15);
    --shadow: 0 1px 3px rgba(26,24,22,0.08), 0 4px 16px rgba(26,24,22,0.04);
    --shadow-lg: 0 4px 24px rgba(26,24,22,0.12), 0 1px 4px rgba(26,24,22,0.06);
    --radius: 14px;
    --radius-sm: 8px;
    --radius-xs: 5px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.dark {
    --bg: #111110;
    --surface: #1C1B19;
    --surface2: #252420;
    --surface3: #302F2B;
    --text: #F0EDE8;
    --text2: #9B9590;
    --text3: #5C5852;
    --accent: #40916C;
    --accent-light: #1A3D2B;
    --accent-text: #74C69D;
    --danger: #E05525;
    --danger-light: #3D1A0E;
    --warn: #D97706;
    --warn-light: #3A2500;
    --info: #3B82F6;
    --info-light: #1A2A4A;
    --border: rgba(240,237,232,0.08);
    --border2: rgba(240,237,232,0.15);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.2);
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    transition: background var(--transition), border-color var(--transition);
  }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* ── SIDEBAR ── */
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
  }
  .brand-icon {
    width: 34px; height: 34px;
    background: var(--text);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background var(--transition);
  }
  .brand-icon svg { color: var(--bg); }
  .brand-name {
    font-family: var(--font-display);
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .sidebar-section { padding: 20px 16px 8px; }
  .sidebar-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3);
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    font-size: 14px; font-weight: 400;
    color: var(--text2);
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--text); color: var(--bg); font-weight: 500; }
  .nav-item.active svg { opacity: 0.9; }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    background: var(--surface2);
    color: var(--text2);
    padding: 1px 7px; border-radius: 20px;
    min-width: 20px; text-align: center;
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,0.2); color: inherit; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 16px 0;
    border-top: 1px solid var(--border);
  }

  .theme-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    font-size: 13px; color: var(--text2);
    cursor: pointer; border: none; width: 100%;
    transition: background var(--transition);
  }
  .theme-toggle:hover { background: var(--surface3); }
  .toggle-track {
    width: 36px; height: 20px;
    background: var(--surface3);
    border-radius: 20px;
    position: relative;
    transition: background var(--transition);
  }
  body.dark .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text3);
    transition: transform var(--transition), background var(--transition);
  }
  body.dark .toggle-thumb { transform: translateX(16px); background: #fff; }

  /* ── TOP BAR ── */
  .topbar {
    padding: 24px 32px 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
  }
  .topbar-title {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .topbar-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

  .add-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: var(--text);
    color: var(--bg);
    border: none; border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.82; }
  .add-btn:active { transform: scale(0.97); }

  /* ── FILTERS ── */
  .filters-bar {
    padding: 20px 32px 0;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px; font-weight: 400;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all var(--transition);
  }
  .filter-chip:hover { border-color: var(--border2); color: var(--text); }
  .filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

  .sort-select {
    margin-left: auto;
    padding: 6px 12px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color var(--transition), background var(--transition);
  }
  .sort-select:hover { border-color: var(--border2); }
  option { background: var(--surface); color: var(--text); }

  /* ── TASK LIST ── */
  .task-area { padding: 20px 32px 40px; flex: 1; }

  .group-header {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text3);
    margin: 24px 0 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .group-header::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .group-header:first-child { margin-top: 0; }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; align-items: flex-start; gap: 14px;
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition), opacity var(--transition), transform var(--transition);
    position: relative;
    animation: taskIn 200ms ease both;
  }
  @keyframes taskIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task-card:hover {
    border-color: var(--border2);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .task-card.completed { opacity: 0.55; }
  .task-card.completed .task-title { text-decoration: line-through; color: var(--text3); }

  .task-card.dragging {
    opacity: 0.4;
    transform: scale(0.98);
  }
  .task-card.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-light);
  }

  /* Priority stripe */
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: transparent;
    transition: background var(--transition);
  }
  .task-card[data-priority="high"]::before { background: var(--danger); }
  .task-card[data-priority="medium"]::before { background: var(--warn); }
  .task-card[data-priority="low"]::before { background: var(--accent); }

  .check-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    color: transparent;
  }
  .check-btn:hover { border-color: var(--accent); background: var(--accent-light); }
  .task-card.completed .check-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.4; }
  .task-meta {
    display: flex; align-items: center; gap: 10px;
    margin-top: 7px; flex-wrap: wrap;
  }
  .task-date {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--text3);
  }
  .task-date svg { width: 11px; height: 11px; }
  .task-date.overdue { color: var(--danger); }

  .priority-badge {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.02em;
  }
  .priority-badge.high { background: var(--danger-light); color: var(--danger); }
  .priority-badge.medium { background: var(--warn-light); color: var(--warn); }
  .priority-badge.low { background: var(--accent-light); color: var(--accent-text); }

  .task-group-tag {
    font-size: 11px; font-weight: 400;
    padding: 2px 8px; border-radius: 20px;
    background: var(--surface2); color: var(--text3);
  }

  .task-actions {
    display: flex; gap: 4px;
    opacity: 0;
    transition: opacity var(--transition);
    flex-shrink: 0;
  }
  .task-card:hover .task-actions { opacity: 1; }

  .icon-btn {
    width: 30px; height: 30px;
    border: none; background: none;
    border-radius: var(--radius-xs);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
    transition: background var(--transition), color var(--transition);
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.del:hover { background: var(--danger-light); color: var(--danger); }
  .icon-btn svg { width: 14px; height: 14px; }

  /* ── DRAG HANDLE ── */
  .drag-handle {
    width: 16px; flex-shrink: 0; display: flex; align-items: center;
    cursor: grab; opacity: 0; transition: opacity var(--transition);
    color: var(--text3); margin-top: 2px;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { width: 14px; height: 14px; }
  .task-card:hover .drag-handle { opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--text3);
    animation: taskIn 300ms ease;
  }
  .empty-icon {
    width: 52px; height: 52px;
    border-radius: 16px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    color: var(--text3);
  }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%; max-width: 480px;
    box-shadow: var(--shadow-lg);
    transform: translateY(12px) scale(0.98);
    transition: transform 200ms cubic-bezier(0.34, 1.2, 0.64, 1);
    border: 1px solid var(--border);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.02em;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition), background var(--transition);
    resize: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--border2);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
  }
  .field textarea { height: 72px; line-height: 1.5; }

  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }

  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 24px;
  }
  .btn-ghost {
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: none;
    color: var(--text2);
    font-family: var(--font-body);
    font-size: 14px;
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .btn-primary {
    padding: 9px 20px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: var(--bg);
    font-family: var(--font-body);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
  }
  .btn-primary:hover { opacity: 0.82; }
  .btn-primary:active { transform: scale(0.97); }

  /* ── STATS ── */
  .stats-row {
    display: flex; gap: 10px;
    padding: 20px 32px 0;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    transition: background var(--transition), border-color var(--transition);
  }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-value { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
  .stat-value.green { color: var(--accent); }
  .stat-value.red { color: var(--danger); }

  /* ── MOBILE SIDEBAR ── */
  .mobile-header {
    display: none;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .mobile-brand {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
  }
  .hamburger {
    width: 36px; height: 36px;
    border: none; background: var(--surface2);
    border-radius: var(--radius-xs); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); transition: background var(--transition);
  }
  .hamburger:hover { background: var(--surface3); }

  .sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 40;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
  }
  .sidebar-backdrop.open { opacity: 1; pointer-events: all; }

  @media (max-width: 720px) {
    .sidebar {
      position: fixed; top: 0; left: -280px; z-index: 50;
      height: 100vh; width: 260px;
      transition: left 250ms cubic-bezier(0.4,0,0.2,1), background var(--transition);
      box-shadow: none;
    }
    .sidebar.open { left: 0; box-shadow: var(--shadow-lg); }
    .mobile-header { display: flex; }
    .topbar { padding: 16px 20px 0; }
    .stats-row { padding: 12px 20px 0; }
    .filters-bar { padding: 12px 20px 0; }
    .task-area { padding: 16px 20px 40px; }
    .sidebar-backdrop { display: block; }
    .topbar-title { font-size: 22px; }
    .add-btn span { display: none; }
    .add-btn { padding: 10px 12px; }
  }

  /* ── CONFIRM DELETE ── */
  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms;
    backdrop-filter: blur(4px);
  }
  .confirm-overlay.open { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 360px; width: 100%;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    transform: scale(0.96);
    transition: transform 200ms cubic-bezier(0.34,1.2,0.64,1);
  }
  .confirm-overlay.open .confirm-box { transform: scale(1); }
  .confirm-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .confirm-sub { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-danger {
    padding: 9px 18px;
    border: none; border-radius: var(--radius-sm);
    background: var(--danger); color: #fff;
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: opacity var(--transition);
  }
  .btn-danger:hover { opacity: 0.85; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <span class="brand-name">TaskFlow</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <button class="nav-item active" data-filter="all" onclick="setFilter('all', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Tasks
        <span class="nav-badge" id="badge-all">0</span>
      </button>
      <button class="nav-item" data-filter="pending" onclick="setFilter('pending', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Pending
        <span class="nav-badge" id="badge-pending">0</span>
      </button>
      <button class="nav-item" data-filter="completed" onclick="setFilter('completed', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Completed
        <span class="nav-badge" id="badge-completed">0</span>
      </button>
      <button class="nav-item" data-filter="overdue" onclick="setFilter('overdue', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Overdue
        <span class="nav-badge" id="badge-overdue">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Priority</div>
      <button class="nav-item" data-filter="high" onclick="setFilter('high', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        High Priority
        <span class="nav-badge" id="badge-high">0</span>
      </button>
      <button class="nav-item" data-filter="medium" onclick="setFilter('medium', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="10"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        Medium Priority
        <span class="nav-badge" id="badge-medium">0</span>
      </button>
      <button class="nav-item" data-filter="low" onclick="setFilter('low', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="16"/><line x1="18" y1="20" x2="18" y2="10"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        Low Priority
        <span class="nav-badge" id="badge-low">0</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleDark()">
        <span style="font-size:13px;color:var(--text2)">Dark mode</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
    </div>
  </aside>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- Main -->
  <div class="main">
    <!-- Mobile header -->
    <div class="mobile-header">
      <span class="mobile-brand">TaskFlow</span>
      <button class="hamburger" onclick="openSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <!-- Top bar -->
    <div class="topbar">
      <div>
        <div class="topbar-title" id="view-title">All Tasks</div>
        <div class="topbar-sub" id="view-sub">Everything in one place</div>
      </div>
      <button class="add-btn" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>New Task</span>
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value green" id="stat-done">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value red" id="stat-overdue">0</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <button class="filter-chip active" data-chip="all" onclick="setChipFilter('all', this)">All</button>
      <button class="filter-chip" data-chip="pending" onclick="setChipFilter('pending', this)">Pending</button>
      <button class="filter-chip" data-chip="completed" onclick="setChipFilter('completed', this)">Completed</button>
      <select class="sort-select" id="sort-select" onchange="render()">
        <option value="default">Default order</option>
        <option value="date-asc">Date (earliest)</option>
        <option value="date-desc">Date (latest)</option>
        <option value="priority">Priority (high–low)</option>
        <option value="alpha">Alphabetical</option>
      </select>
    </div>

    <!-- Task area -->
    <div class="task-area">
      <div class="task-list" id="task-list"></div>
    </div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Task</div>
      <button class="icon-btn" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="field">
      <label>Task title</label>
      <input type="text" id="f-title" placeholder="What needs to be done?" autocomplete="off">
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="f-desc" placeholder="Add more context..."></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Time</label>
        <input type="time" id="f-time">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Priority</label>
        <select id="f-priority">
          <option value="">None</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="field">
        <label>Group</label>
        <select id="f-group">
          <option value="">No group</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Health">Health</option>
          <option value="Learning">Learning</option>
          <option value="Shopping">Shopping</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Delete task?</div>
    <div class="confirm-sub">This action cannot be undone.</div>
    <div class="confirm-actions">
      <button class="btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'taskflow_v2';
let tasks = [];
let currentFilter = 'all';
let chipFilter = 'all';
let editingId = null;
let deletingId = null;
let dragSrcId = null;

const PRIORITY_ORDER = { high: 0, medium: 1, low: 2, '': 3 };

function load() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { tasks = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function isOverdue(t) {
  if (!t.date || t.completed) return false;
  const now = new Date();
  const d = t.time ? new Date(t.date + 'T' + t.time) : new Date(t.date + 'T23:59:59');
  return d < now;
}

function getFiltered() {
  let list = [...tasks];
  if (currentFilter === 'completed') list = list.filter(t => t.completed);
  else if (currentFilter === 'pending') list = list.filter(t => !t.completed);
  else if (currentFilter === 'overdue') list = list.filter(isOverdue);
  else if (['high','medium','low'].includes(currentFilter)) list = list.filter(t => t.priority === currentFilter);

  if (chipFilter === 'completed') list = list.filter(t => t.completed);
  else if (chipFilter === 'pending') list = list.filter(t => !t.completed);

  const sort = document.getElementById('sort-select').value;
  if (sort === 'date-asc') list.sort((a,b) => (a.date||'9') < (b.date||'9') ? -1 : 1);
  else if (sort === 'date-desc') list.sort((a,b) => (a.date||'') > (b.date||'') ? -1 : 1);
  else if (sort === 'priority') list.sort((a,b) => (PRIORITY_ORDER[a.priority]||3) - (PRIORITY_ORDER[b.priority]||3));
  else if (sort === 'alpha') list.sort((a,b) => a.title.localeCompare(b.title));
  return list;
}

function fmtDate(t) {
  if (!t.date) return null;
  const d = new Date(t.date + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const tom = new Date(today); tom.setDate(tom.getDate()+1);
  const dd = new Date(t.date + 'T00:00:00');
  let label;
  if (dd.getTime() === today.getTime()) label = 'Today';
  else if (dd.getTime() === tom.getTime()) label = 'Tomorrow';
  else label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  if (t.time) {
    const [h,m] = t.time.split(':');
    const h12 = (+h % 12) || 12;
    label += ` · ${h12}:${m}${+h < 12 ? 'am' : 'pm'}`;
  }
  return label;
}

function render() {
  const list = getFiltered();
  const container = document.getElementById('task-list');

  // Group by task.group if no priority sort
  const sort = document.getElementById('sort-select').value;
  const grouped = sort === 'default';

  updateBadges();
  updateStats();
  updateViewMeta();

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <div class="empty-title">No tasks here</div>
        <div class="empty-sub">Add a task to get started</div>
      </div>`;
    return;
  }

  let html = '';
  if (grouped) {
    const groups = {};
    list.forEach(t => { const g = t.group || 'Uncategorized'; if (!groups[g]) groups[g] = []; groups[g].push(t); });
    for (const [gname, gtasks] of Object.entries(groups)) {
      html += `<div class="group-header">${gname}</div>`;
      gtasks.forEach(t => { html += cardHTML(t); });
    }
  } else {
    list.forEach(t => { html += cardHTML(t); });
  }
  container.innerHTML = html;

  // Drag events
  container.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragover', onDragOver);
    card.addEventListener('dragleave', onDragLeave);
    card.addEventListener('drop', onDrop);
    card.addEventListener('dragend', onDragEnd);
  });
}

function cardHTML(t) {
  const overdue = isOverdue(t);
  const dateStr = fmtDate(t);
  const pClass = t.priority || '';
  return `
    <div class="task-card${t.completed?' completed':''}" data-id="${t.id}" data-priority="${t.priority||''}" draggable="true">
      <div class="drag-handle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="9" cy="7" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="7" r="1" fill="currentColor" stroke="none"/>
          <circle cx="9" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"/>
          <circle cx="9" cy="17" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="17" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <button class="check-btn" onclick="toggleTask('${t.id}',event)" title="${t.completed?'Mark pending':'Mark done'}">
        ${t.completed?`<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>`:''}
      </button>
      <div class="task-body">
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.desc ? `<div style="font-size:13px;color:var(--text3);margin-top:3px;line-height:1.5">${escHtml(t.desc)}</div>` : ''}
        <div class="task-meta">
          ${dateStr ? `<span class="task-date${overdue?' overdue':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}</span>` : ''}
          ${t.priority ? `<span class="priority-badge ${pClass}">${t.priority}</span>` : ''}
          ${t.group ? `<span class="task-group-tag">${escHtml(t.group)}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="editTask('${t.id}',event)" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn del" onclick="askDelete('${t.id}',event)" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleTask(id, e) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (t) { t.completed = !t.completed; save(); render(); }
}

function editTask(id, e) {
  e.stopPropagation();
  editingId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.desc || '';
  document.getElementById('f-date').value = t.date || '';
  document.getElementById('f-time').value = t.time || '';
  document.getElementById('f-priority').value = t.priority || '';
  document.getElementById('f-group').value = t.group || '';
  openModal();
}

function askDelete(id, e) {
  e.stopPropagation();
  deletingId = id;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
  deletingId = null;
}
function confirmDelete() {
  if (!deletingId) return;
  tasks = tasks.filter(t => t.id !== deletingId);
  save(); render(); closeConfirm();
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-priority').value = '';
  document.getElementById('f-group').value = '';
  document.getElementById('modal-title').textContent = 'New Task';
}
function maybeCloseModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    priority: document.getElementById('f-priority').value,
    group: document.getElementById('f-group').value,
  };
  if (editingId) {
    const t = tasks.find(t => t.id === editingId);
    Object.assign(t, data);
  } else {
    tasks.unshift({ id: uid(), completed: false, createdAt: Date.now(), ...data });
  }
  save(); render(); closeModal();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  // sync chips
  chipFilter = 'all';
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.chip === 'all');
  });
  render(); closeSidebar();
}

function setChipFilter(f, el) {
  chipFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

const VIEW_META = {
  all: ['All Tasks', 'Everything in one place'],
  pending: ['Pending', 'Tasks yet to be done'],
  completed: ['Completed', 'Tasks you\'ve finished'],
  overdue: ['Overdue', 'These need your attention'],
  high: ['High Priority', 'Urgent tasks'],
  medium: ['Medium Priority', 'Normal importance'],
  low: ['Low Priority', 'When you get a chance'],
};
function updateViewMeta() {
  const [title, sub] = VIEW_META[currentFilter] || ['All Tasks',''];
  document.getElementById('view-title').textContent = title;
  document.getElementById('view-sub').textContent = sub;
}

function updateBadges() {
  const now = new Date();
  document.getElementById('badge-all').textContent = tasks.length;
  document.getElementById('badge-pending').textContent = tasks.filter(t => !t.completed).length;
  document.getElementById('badge-completed').textContent = tasks.filter(t => t.completed).length;
  document.getElementById('badge-overdue').textContent = tasks.filter(isOverdue).length;
  document.getElementById('badge-high').textContent = tasks.filter(t => t.priority==='high').length;
  document.getElementById('badge-medium').textContent = tasks.filter(t => t.priority==='medium').length;
  document.getElementById('badge-low').textContent = tasks.filter(t => t.priority==='low').length;
}

function updateStats() {
  document.getElementById('stat-total').textContent = tasks.length;
  document.getElementById('stat-done').textContent = tasks.filter(t => t.completed).length;
  document.getElementById('stat-pending').textContent = tasks.filter(t => !t.completed).length;
  document.getElementById('stat-overdue').textContent = tasks.filter(isOverdue).length;
}

// Dark mode
function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('taskflow_dark', document.body.classList.contains('dark') ? '1' : '');
}
if (localStorage.getItem('taskflow_dark')) document.body.classList.add('dark');

// Mobile sidebar
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-backdrop').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
});

// Drag & drop
function onDragStart(e) {
  dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.currentTarget;
  if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcId && targetId && dragSrcId !== targetId) {
    const si = tasks.findIndex(t => t.id === dragSrcId);
    const ti = tasks.findIndex(t => t.id === targetId);
    if (si !== -1 && ti !== -1) {
      const [moved] = tasks.splice(si, 1);
      tasks.splice(ti, 0, moved);
      save(); render();
    }
  }
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
  dragSrcId = null;
}

// Seed demo tasks if empty
function maybeSeed() {
  if (tasks.length > 0) return;
  const today = new Date().toISOString().split('T')[0];
  const tom = new Date(Date.now()+86400000).toISOString().split('T')[0];
  const yest = new Date(Date.now()-86400000).toISOString().split('T')[0];
  tasks = [
    { id:uid(), title:'Prepare Q2 project report', desc:'Compile data from all departments and create executive summary', date:tom, time:'09:00', priority:'high', group:'Work', completed:false, createdAt:Date.now() },
    { id:uid(), title:'Team standup meeting', date:today, time:'10:30', priority:'medium', group:'Work', completed:false, createdAt:Date.now() },
    { id:uid(), title:'Morning run — 5km', date:today, priority:'low', group:'Health', completed:true, createdAt:Date.now() },
    { id:uid(), title:'Review pull requests', desc:'Check open PRs on the design system repo', date:today, priority:'medium', group:'Work', completed:false, createdAt:Date.now() },
    { id:uid(), title:'Buy groceries', desc:'Milk, eggs, bread, fruits', date:yest, priority:'', group:'Shopping', completed:false, createdAt:Date.now() },
    { id:uid(), title:'Read "Designing Data-Intensive Apps"', desc:'Chapters 4–6', date:tom, priority:'low', group:'Learning', completed:false, createdAt:Date.now() },
  ];
  save();
}

load();
maybeSeed();
render();
</script>
</body>
</html>
